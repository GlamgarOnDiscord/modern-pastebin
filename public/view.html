<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribble - Viewer</title>
    <meta name="description" content="View a shared Scribble paste with real-time sync." />
    
    <!-- Open Graph / Social -->
    <meta property="og:title" content="Scribble Viewer" />
    <meta property="og:description" content="Securely view shared code or text snippets instantly." />
    <meta property="og:image" content="https://modern-pastebin.vercel.app/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Scribble Viewer" />
    <meta name="twitter:description" content="Securely view shared code or text snippets instantly." />
    <meta name="twitter:image" content="https://modern-pastebin.vercel.app/og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%E2%9C%A6</text></svg>">
</head>
<body>

    <div id="toast" class="toast">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="toastText"></span>
    </div>

    <!-- Auth -->
    <div id="authOverlay" class="auth-overlay" style="display:none;">
        <div class="auth-box">
            <div class="auth-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </div>
            <h2>Secured Paste</h2>
            <p>Enter the PIN to continue.</p>
            <form id="authForm">
                <input type="password" id="authPin" class="auth-input" placeholder="&#8226;&#8226;&#8226;&#8226;" maxlength="8" required autofocus autocomplete="off">
                <div id="authError" class="auth-error"></div>
                <button type="submit" class="cta-btn" id="unlockBtn" style="width:100%;">
                    <span class="btn-label">Unlock</span>
                    <span class="spinner"></span>
                </button>
            </form>
        </div>
    </div>

    <!-- Error -->
    <div id="errorView" class="view" style="display:none;">
        <div class="page" style="justify-content:center;min-height:80dvh;">
            <nav>
                <a href="/" class="brand"><span class="brand-mark" aria-hidden="true">&#10022;</span> Scribble</a>
            </nav>
            <div class="error-state panel">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                <h2>Paste not found</h2>
                <p>This paste doesn't exist or has expired.</p>
                <a href="/" class="ghost-btn" style="margin-top:8px;text-decoration:none;">Create a new paste</a>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div id="contentView" class="view">
        <div class="page">
            <nav>
                <div style="display:flex;align-items:center;gap:10px;">
                    <a href="/" class="brand"><span class="brand-mark" aria-hidden="true">&#10022;</span> Scribble</a>
                    <span class="id-badge" id="viewerId"></span>
                </div>
                <div class="status saved pulse" id="syncBadge">
                    <div class="status-dot"></div>
                    <span id="syncText">Live</span>
                </div>
            </nav>

            <div class="editor-bar">
                <button class="tool-btn" onclick="copyContent()" id="copyBtn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <span>Copy</span>
                </button>
                <div class="toolbar-spacer"></div>
                <span class="char-label" id="viewerCount">0 chars</span>
            </div>

            <div class="panel viewer-panel">
                <pre id="viewerContent">Loading...</pre>
            </div>

            <footer class="foot"><p>Syncs every 1.5s<span class="foot-sep"></span><a href="/">Create your own</a></p></footer>
        </div>
    </div>

    <script>
        const viewerContent = document.getElementById('viewerContent');
        const contentView = document.getElementById('contentView');
        const errorView = document.getElementById('errorView');
        const authOverlay = document.getElementById('authOverlay');

        let id = null, token = null, poll = null;
        let pollMs = 1500;
        const ACTIVE = 1500, IDLE = 5000;

        let tt;
        function toast(m) {
            const t = document.getElementById("toast");
            document.getElementById("toastText").textContent = m;
            t.classList.add("visible"); clearTimeout(tt);
            tt = setTimeout(() => t.classList.remove("visible"), 2200);
        }

        document.addEventListener('visibilitychange', () => {
            if (poll) { clearInterval(poll); pollMs = document.hidden ? IDLE : ACTIVE; poll = setInterval(() => fetchContent(token), pollMs); }
        });

        // Init
        (async () => {
            id = new URLSearchParams(location.search).get('id');
            if (!id) { showError(); return; }
            document.getElementById('viewerId').textContent = id;
            try {
                const r = await fetch(`/api/content?id=${id}`);
                if (r.status === 404) { showError(); return; }
                if (r.ok) { const d = await r.json(); viewerContent.textContent = d.content || ''; updateCount(); showContent(); startSync(null); return; }
                if (r.status === 401) { showAuth(); return; }
            } catch(e) { showError(); }
        })();

        function showContent() { contentView.style.display=''; contentView.style.opacity='1'; contentView.style.pointerEvents=''; contentView.style.filter=''; errorView.style.display='none'; authOverlay.style.display='none'; }
        function showError() { contentView.style.display='none'; errorView.style.display=''; authOverlay.style.display='none'; }
        function showAuth() { contentView.style.opacity='0.06'; contentView.style.pointerEvents='none'; contentView.style.filter='blur(8px)'; authOverlay.style.display=''; errorView.style.display='none'; }

        document.getElementById('authForm').addEventListener('submit', async e => {
            e.preventDefault();
            const pin = document.getElementById('authPin').value;
            if (!pin) return;
            const btn = document.getElementById('unlockBtn');
            btn.classList.add('loading'); btn.disabled = true;
            document.getElementById('authError').textContent = '';
            try {
                const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({pin, pasteId:id}) });
                const d = await r.json();
                if (r.ok && d.token) { token = d.token; showContent(); startSync(token); toast("Unlocked"); }
                else {
                    document.getElementById('authError').textContent = d.message || 'Invalid PIN';
                    btn.classList.remove('loading'); btn.disabled = false;
                    document.getElementById('authPin').value = ''; document.getElementById('authPin').focus();
                    const box = document.querySelector('.auth-box'); box.style.animation='none'; box.offsetHeight; box.style.animation='shake 0.4s ease';
                }
            } catch(err) { document.getElementById('authError').textContent = 'Server error'; btn.classList.remove('loading'); btn.disabled = false; }
        });

        function updateCount() { document.getElementById('viewerCount').textContent = (viewerContent.textContent||'').length.toLocaleString()+' chars'; }

        async function fetchContent(tk) {
            try {
                let u = `/api/content?id=${id}`; if (tk) u += `&token=${tk}`;
                const r = await fetch(u);
                if (r.ok) { const d = await r.json(); if (d.content !== viewerContent.textContent) { viewerContent.textContent = d.content; updateCount(); } }
                else if (r.status === 401) { clearInterval(poll); location.reload(); }
            } catch(e) {}
        }

        function startSync(tk) { fetchContent(tk); pollMs = document.hidden ? IDLE : ACTIVE; poll = setInterval(() => fetchContent(tk), pollMs); }

        function copyContent() {
            navigator.clipboard.writeText(viewerContent.textContent).then(() => {
                const b = document.getElementById('copyBtn'), s = b.querySelector('span');
                b.classList.add('copied'); s.textContent = 'Copied!'; toast('Copied');
                setTimeout(() => { b.classList.remove('copied'); s.textContent = 'Copy'; }, 1500);
            });
        }
    </script>
</body>
</html>
